<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC 2026 Predictions</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1a6b3c;--green-mid:#2e8b57;--green-light:#d4edda;
  --gold:#c9a84c;--gold-light:#fff8e7;
  --red:#c0392b;--purple:#5b21b6;--purple-light:#ede9fe;
  --gray-dark:#2c2c2a;--gray-mid:#888780;--gray-light:#f1efe8;
  --shadow:0 2px 12px rgba(0,0,0,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0f2a1a;min-height:100vh;color:var(--gray-dark);-webkit-text-size-adjust:100%;}

header{background:linear-gradient(135deg,#0a1f12,#1a6b3c 60%,#0f3d22);padding:1.25rem 1rem 1rem;text-align:center;border-bottom:3px solid var(--gold);position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(255,255,255,.02) 30px,rgba(255,255,255,.02) 60px);}
.header-badge{display:inline-block;background:var(--gold);color:#3a2600;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 12px;border-radius:20px;margin-bottom:.4rem;}
header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,8vw,3.5rem);color:#fff;letter-spacing:2px;line-height:1;margin-bottom:.2rem;}
header h1 span{color:var(--gold);}
header p{color:rgba(255,255,255,.65);font-size:.82rem;}
.player-badge{display:inline-block;background:rgba(201,168,76,.2);border:1px solid var(--gold);color:var(--gold);font-size:.78rem;font-weight:600;padding:3px 12px;border-radius:20px;margin-top:.4rem;}

nav{background:#122a1c;display:flex;justify-content:center;gap:4px;padding:.5rem .75rem;border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap;}
nav button{background:transparent;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);padding:.35rem .75rem;border-radius:6px;font-family:'Inter',sans-serif;font-size:.75rem;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
nav button:active,nav button:hover{background:rgba(255,255,255,.1);color:#fff;}
nav button.active{background:var(--green);border-color:var(--green);color:#fff;}
nav button.locked{opacity:.45;cursor:default;}

main{max-width:960px;margin:0 auto;padding:1.25rem .9rem 5rem;}
.panel{display:none;}.panel.active{display:block;}

.card{background:#fff;border-radius:12px;padding:1.25rem;box-shadow:var(--shadow);}
.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:.9rem;flex-wrap:wrap;}
.sec-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;color:#fff;letter-spacing:1px;}
.pill{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:20px;padding:2px 10px;font-size:.7rem;flex-shrink:0;}
.sub-text{color:rgba(255,255,255,.55);font-size:.8rem;margin-bottom:1.1rem;line-height:1.5;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:.6rem 1.1rem;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.btn-green{background:var(--green);color:#fff;}.btn-green:active{background:#155a31;}
.btn-gold{background:var(--gold);color:#3a2600;}.btn-gold:active{background:#b8952e;}
.btn-red{background:var(--red);color:#fff;}
.btn-gray{background:#888;color:#fff;}
.btn-full{width:100%;}

/* WELCOME PAGE */
.welcome-wrap{min-height:calc(100vh - 120px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;}
.welcome-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,9vw,4.5rem);color:#fff;letter-spacing:3px;text-align:center;line-height:1;margin-bottom:.3rem;}
.welcome-title span{color:var(--gold);}
.welcome-sub{color:rgba(255,255,255,.55);font-size:.9rem;text-align:center;margin-bottom:2.5rem;}
.welcome-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;max-width:520px;}
@media(max-width:480px){.welcome-cards{grid-template-columns:1fr;}}
.welcome-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;padding:1.75rem 1rem;border-radius:16px;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;}
.welcome-btn:active{transform:scale(.97);}
.welcome-btn .w-icon{font-size:2.8rem;line-height:1;}
.welcome-btn .w-title{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1.5px;}
.welcome-btn .w-desc{font-size:.75rem;opacity:.8;line-height:1.4;text-align:center;}
.welcome-btn.predictions{background:linear-gradient(135deg,#1a6b3c,#2e8b57);color:#fff;box-shadow:0 6px 24px rgba(26,107,60,.4);}
.welcome-btn.scores{background:linear-gradient(135deg,#c9a84c,#e6bf6a);color:#3a2600;box-shadow:0 6px 24px rgba(201,168,76,.35);}

/* LIVE SCORES PAGE */
.scores-wrap{padding-bottom:2rem;}
.scores-top-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;}
.scores-top-bar h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:#fff;letter-spacing:1px;flex:1;}
.live-dot{width:9px;height:9px;border-radius:50%;background:#e53935;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.scores-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.1rem;}
.filter-btn{padding:.3rem .85rem;border-radius:20px;font-family:'Inter',sans-serif;font-size:.75rem;font-weight:600;cursor:pointer;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.filter-btn.active{background:var(--gold);border-color:var(--gold);color:#3a2600;}
.filter-btn:active{opacity:.7;}
.scores-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px;}
.score-card{background:#fff;border-radius:12px;padding:1rem;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.score-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.score-card.status-live::before{background:var(--red);animation:pulse-bar 1.2s infinite;}
.score-card.status-ft::before{background:var(--green);}
.score-card.status-upcoming::before{background:#d0d0cc;}
@keyframes pulse-bar{0%,100%{opacity:1;}50%{opacity:.4;}}
.score-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;}
.score-round{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-mid);}
.score-status-badge{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:10px;}
.badge-live{background:#ffe0e0;color:var(--red);}
.badge-ft{background:#d4edda;color:var(--green);}
.badge-upcoming{background:var(--gray-light);color:var(--gray-mid);}
.badge-ht{background:#fff8e7;color:#856404;}
.score-teams{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:.5rem;}
.score-team{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center;}
.score-team-name{font-size:.8rem;font-weight:700;color:var(--gray-dark);line-height:1.2;}
.score-flag{font-size:1.4rem;line-height:1;}
.score-vs{font-size:.65rem;font-weight:600;color:var(--gray-mid);text-align:center;}
.score-nums{display:flex;align-items:center;gap:.35rem;justify-content:center;}
.score-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gray-dark);line-height:1;min-width:24px;text-align:center;}
.score-sep{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gray-mid);line-height:1;}
.score-num.live-num{color:var(--red);}
.score-card-footer{margin-top:.75rem;padding-top:.65rem;border-top:1px solid #f0efe8;display:flex;align-items:center;justify-content:space-between;}
.score-venue{font-size:.65rem;color:var(--gray-mid);}
.score-time{font-size:.65rem;font-weight:600;color:var(--gray-mid);}
.score-minute{font-size:.68rem;font-weight:700;color:var(--red);background:#ffe0e0;padding:1px 6px;border-radius:8px;}
.scorers-list{font-size:.67rem;color:var(--gray-mid);margin-top:.35rem;line-height:1.5;}
.scorers-list span{color:var(--green);font-weight:600;}
.no-matches{text-align:center;padding:3rem 1rem;color:rgba(255,255,255,.4);}
.no-matches .nm-icon{font-size:2.5rem;margin-bottom:.5rem;}
.refresh-btn{display:flex;align-items:center;gap:5px;padding:.35rem .85rem;border-radius:20px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);font-size:.75rem;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.refresh-btn:active{background:rgba(255,255,255,.18);}
.auto-refresh-label{font-size:.7rem;color:rgba(255,255,255,.4);}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;gap:1rem;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-screen p{color:rgba(255,255,255,.6);font-size:.9rem;}

/* HOME / PLAYER SELECT */
.home-card{max-width:480px;margin:0 auto;background:#fff;border-radius:16px;padding:1.75rem;box-shadow:var(--shadow);}
.home-card h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--green);letter-spacing:1px;margin-bottom:.25rem;}
.home-card p{font-size:.82rem;color:var(--gray-mid);margin-bottom:1.25rem;line-height:1.5;}
.player-select-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1.25rem;}
.player-select-btn{display:flex;align-items:center;gap:10px;padding:.75rem 1rem;border:1.5px solid #e0dfd8;border-radius:10px;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;font-size:.92rem;font-weight:600;color:var(--gray-dark);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.player-select-btn:active,.player-select-btn:hover{border-color:var(--green);background:var(--green-light);}
.player-select-btn .avatar{width:32px;height:32px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.player-select-btn .status-tag{margin-left:auto;font-size:.68rem;font-weight:600;padding:2px 8px;border-radius:10px;}
.status-submitted{background:#d4edda;color:#1a6b3c;}
.status-pending{background:#fff8e7;color:#856404;}
.admin-link{text-align:center;margin-top:.75rem;}
.admin-link button{background:none;border:none;color:var(--gray-mid);font-size:.75rem;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;}

.back-btn{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.75);padding:.3rem .85rem;border-radius:20px;font-size:.75rem;font-weight:600;cursor:pointer;margin-bottom:1rem;-webkit-tap-highlight-color:transparent;}
.back-btn:active{background:rgba(255,255,255,.18);}

/* ADMIN LOGIN */
.login-card{max-width:380px;margin:0 auto;background:#fff;border-radius:16px;padding:1.75rem;box-shadow:var(--shadow);text-align:center;}
.login-card h2{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--red);letter-spacing:1px;margin-bottom:.25rem;}
.login-card p{font-size:.8rem;color:var(--gray-mid);margin-bottom:1.1rem;}
.login-card input{width:100%;padding:10px 14px;border:1.5px solid #d0d0cc;border-radius:8px;font-family:'Inter',sans-serif;font-size:1rem;text-align:center;letter-spacing:3px;margin-bottom:.75rem;}
.login-card input:focus{outline:none;border-color:var(--red);}
#login-error{font-size:.8rem;color:var(--red);margin-top:.4rem;}

/* ADMIN */
.setup-card{max-width:620px;margin:0 auto;}
.setup-card h2{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;color:var(--green);letter-spacing:1px;margin-bottom:.15rem;}
.setup-card .sub{font-size:.8rem;color:var(--gray-mid);margin-bottom:1.1rem;}
.player-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.1rem;}
.player-row{display:flex;align-items:center;gap:8px;}
.player-num{width:26px;height:26px;border-radius:50%;background:var(--green);color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.player-row input{flex:1;padding:8px 11px;border:1px solid #d0d0cc;border-radius:7px;font-family:'Inter',sans-serif;font-size:.9rem;color:var(--gray-dark);}
.player-row input:focus{outline:none;border-color:var(--green);}

.unlock-row{display:flex;align-items:center;gap:10px;margin-top:1.1rem;padding:.75rem 1rem;background:#fff8e7;border:1px solid var(--gold);border-radius:10px;}
.unlock-row label{font-size:.82rem;font-weight:600;color:#5a3e00;flex:1;}
.toggle-switch{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:24px;transition:.3s;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle-switch input:checked+.toggle-slider{background:var(--green);}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(20px);}

.save-status{margin-top:.6rem;font-size:.8rem;font-weight:600;text-align:center;}

/* LEADERBOARD */
.lb-hdr{background:#fff;border-radius:12px;padding:1.1rem 1.25rem;box-shadow:var(--shadow);margin-bottom:1.1rem;}
.lb-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--green);letter-spacing:1px;}
.lb-hdr p{font-size:.78rem;color:var(--gray-mid);}
.pts-legend{display:flex;gap:.4rem;flex-wrap:wrap;margin-top:.55rem;}
.legend-chip{background:var(--gray-light);border-radius:20px;padding:2px 10px;font-size:.7rem;color:var(--gray-mid);font-weight:500;}
.legend-chip span{color:var(--gray-dark);font-weight:700;}
.lb-table{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:400px;}
thead th{background:var(--green);color:#fff;font-size:.72rem;font-weight:600;padding:9px 8px;text-align:center;white-space:nowrap;}
thead th:nth-child(2){text-align:left;padding-left:.9rem;}
tbody tr{border-bottom:1px solid #f0efe8;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f7f6f2;}
tbody td{padding:8px 8px;font-size:.82rem;text-align:center;}
tbody td:nth-child(2){text-align:left;}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-weight:700;font-size:.76rem;}
.rank-1{background:#ffd700;color:#5a3e00;}.rank-2{background:#c0c0c0;color:#3a3a3a;}.rank-3{background:#cd7f32;color:#fff;}.rank-other{background:var(--gray-light);color:var(--gray-mid);}
.player-name-cell{font-weight:600;color:var(--gray-dark);}
.total-pts{font-weight:700;color:var(--green);}

/* ADMIN QUAL/KO/TW */
.qual-section{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.1rem;}
.qual-hdr{background:var(--green);color:#fff;padding:.6rem 1rem;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.qual-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:1px;}
.qual-hdr .teams-badge{background:rgba(255,255,255,.2);border-radius:10px;padding:1px 9px;font-size:.68rem;word-break:break-word;}
.qual-body{padding:.75rem 1rem;}
.qual-actual-row{display:flex;align-items:center;gap:7px;margin-bottom:.65rem;padding-bottom:.65rem;border-bottom:1px solid #f0efe8;flex-wrap:wrap;}
.qual-actual-label{font-size:.67rem;font-weight:700;color:var(--gold);text-transform:uppercase;width:82px;flex-shrink:0;}
.qual-actual-picks{display:flex;gap:7px;flex:1;flex-wrap:wrap;}
.qual-actual-picks select{padding:5px 7px;border:1.5px solid var(--gold);border-radius:6px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;color:var(--gray-dark);background:var(--gold-light);min-width:110px;flex:1;}
.qual-player-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap;}
.qual-player-label{font-size:.7rem;font-weight:600;color:var(--gray-mid);width:82px;flex-shrink:0;}
.qual-picks{display:flex;gap:7px;flex:1;flex-wrap:wrap;}
.qual-picks select{padding:5px 7px;border:1px solid #e0dfd8;border-radius:6px;font-family:'Inter',sans-serif;font-size:.76rem;color:var(--gray-dark);background:#fff;min-width:110px;flex:1;}
.qual-picks select.correct{border-color:#2e8b57;background:#f0faf4;color:#1a6b3c;font-weight:600;}
.qual-picks select.wrong{border-color:#e53935;background:#fff5f5;color:#c62828;}
.thirds-actual{background:var(--purple-light);border-radius:8px;padding:.75rem .9rem;margin-bottom:.9rem;}
.thirds-actual-label{font-size:.67rem;font-weight:700;color:var(--purple);text-transform:uppercase;margin-bottom:.45rem;}
.thirds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;}
.thirds-chip-select{padding:5px 8px;border:1.5px solid var(--purple);border-radius:6px;font-family:'Inter',sans-serif;font-size:.76rem;font-weight:600;color:var(--purple);background:#fff;width:100%;}
.thirds-player-block{border-bottom:1px solid #f0efe8;padding:.5rem 0;}
.thirds-player-block:last-child{border-bottom:none;}
.thirds-player-name{font-size:.75rem;font-weight:700;color:var(--gray-dark);margin-bottom:.3rem;}
.thirds-pick-select{padding:5px 7px;border:1px solid #e0dfd8;border-radius:6px;font-family:'Inter',sans-serif;font-size:.73rem;color:var(--gray-dark);background:#fff;width:100%;}
.thirds-pick-select.correct{border-color:#2e8b57;background:#f0faf4;color:#1a6b3c;font-weight:600;}
.thirds-pick-select.wrong{border-color:#e53935;background:#fff5f5;color:#c62828;}
.ko-subtabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.9rem;}
.ko-subtab{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:.3rem .75rem;border-radius:20px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;}
.ko-subtab.r32.active{background:#c0392b;border-color:#c0392b;color:#fff;}
.ko-subtab.r16.active{background:#e67e22;border-color:#e67e22;color:#fff;}
.ko-subtab.qf.active{background:#8b1a1a;border-color:#8b1a1a;color:#fff;}
.ko-subtab.sf.active{background:#5b21b6;border-color:#5b21b6;color:#fff;}
.ko-subtab.tp.active{background:#555;border-color:#555;color:#fff;}
.ko-subtab.f.active{background:var(--gold);border-color:var(--gold);color:#3a2600;}
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;}
.match-card{background:#fff;border-radius:10px;padding:.85rem .9rem;box-shadow:var(--shadow);border-left:4px solid #ccc;}
.match-card.ko-r32{border-left-color:#c0392b;}.match-card.ko-r16{border-left-color:#e67e22;}
.match-card.ko-qf{border-left-color:#8b1a1a;}.match-card.ko-sf{border-left-color:#5b21b6;}
.match-card.ko-tp{border-left-color:#888;}.match-card.ko-f{border-left-color:var(--gold);}
.match-round-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.pred-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.pred-player{font-size:.7rem;font-weight:600;color:var(--gray-mid);width:68px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-select{flex:1;padding:5px 6px;border:1px solid #e0dfd8;border-radius:6px;font-family:'Inter',sans-serif;font-size:.76rem;color:var(--gray-dark);background:#fff;}
.pred-select.correct{border-color:#2e8b57;background:#f0faf4;color:#1a6b3c;font-weight:600;}
.pred-select.wrong{border-color:#e53935;background:#fff5f5;color:#c62828;}
.actual-row{margin-top:8px;padding-top:8px;border-top:1px solid #f0efe8;display:flex;align-items:center;gap:7px;}
.actual-label{font-size:.65rem;font-weight:700;color:var(--gold);text-transform:uppercase;width:68px;flex-shrink:0;}
.actual-select{flex:1;padding:5px 6px;border:1.5px solid var(--gold);border-radius:6px;font-family:'Inter',sans-serif;font-size:.76rem;font-weight:600;color:var(--gray-dark);background:var(--gold-light);}
.tw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:1.1rem;}
.tw-card{background:#fff;border-radius:10px;padding:.9rem;box-shadow:var(--shadow);}

<script>
// ══ CONFIG — EDIT THESE ══════════════════════════════════════════════════
const GH_OWNER  = 'mohamadndine';
const GH_REPO   = 'wc2026';
const DATA_FILE = 'data.json';
const ADMIN_PASSWORD = 'BrosWorldCup26';

// Prediction deadline: June 17 2026 22:00 ET = UTC-4 in summer → 02:00 UTC June 18
const PREDICTION_DEADLINE = new Date('2026-06-18T02:00:00Z');

// Knockout auto-unlock schedule (ET = UTC-4 in summer)
// Round of 32: June 28 2026 15:00 ET = 19:00 UTC
const R32_UNLOCK = new Date('2026-06-28T19:00:00Z');
// Round of 16: July 4 2026 13:00 ET = 17:00 UTC
const R16_UNLOCK = new Date('2026-07-04T17:00:00Z');
// ════════════════════════════════════════════════════════════════════════

const GROUPS={
  A:["Mexico","South Korea","South Africa","Czechia"],
  B:["Canada","Bosnia-Herzegovina","Qatar","Switzerland"],
  C:["Brazil","Morocco","Haiti","Scotland"],
  D:["USA","Paraguay","Australia","Türkiye"],
  E:["Germany","Curaçao","Ivory Coast","Ecuador"],
  F:["Netherlands","Japan","Sweden","Tunisia"],
  G:["Belgium","Egypt","Iran","New Zealand"],
  H:["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  I:["France","Senegal","Iraq","Norway"],
  J:["Argentina","Algeria","Austria","Jordan"],
  K:["Portugal","Congo DR","Uzbekistan","Colombia"],
  L:["England","Croatia","Ghana","Panama"],
};
const ALL_TEAMS=[...new Set(Object.values(GROUPS).flat())].sort();
const GROUP_KEYS=Object.keys(GROUPS);
const KO_DEF=[
  {key:"Round of 32",count:16,cls:"ko-r32"},
  {key:"Round of 16",count:8,cls:"ko-r16"},
  {key:"Quarter-finals",count:4,cls:"ko-qf"},
  {key:"Semi-finals",count:2,cls:"ko-sf"},
  {key:"3rd Place",count:1,cls:"ko-tp"},
  {key:"Final",count:1,cls:"ko-f"},
];
const KO_MATCHES=[];
for(const {key,count,cls} of KO_DEF)
  for(let i=1;i<=count;i++)
    KO_MATCHES.push({id:`ko_${key.replace(/\s/g,'_')}_${i}`,round:key,label:`Match ${i}`,cls});

// ══ GAME STATE (loaded from GitHub) ══════════════════════════════════════
let GD = {                  // Game Data — mirrors data.json
  players: [],
  unlocked: false,
  qualActual: {},
  thirdsActual: [],
  koResults: {},
  twActual: "",
  predictions: {}           // { playerName: { qual, thirds, ko, tw } }
};
let ghToken = '';           // stored in sessionStorage, never in repo
let ghFileSha = '';         // needed for GitHub API updates
let currentPlayer = null;   // name of the logged-in player
let isAdmin = false;
let PP = { qual:{}, thirds:{}, ko:{}, tw:'' }; // player's local picks
let currentKORound = 'Round of 32';

// ══ TIME HELPERS ══════════════════════════════════════════════════════════
function isPredictionLocked(){ return new Date() >= PREDICTION_DEADLINE; }
function isR32Unlocked(){ return new Date() >= R32_UNLOCK; }
function isR16Unlocked(){ return new Date() >= R16_UNLOCK; }

// Which KO rounds are currently open for player picks
function unlockedKORounds(){
  const rounds = [];
  if(isR32Unlocked()) rounds.push('Round of 32');
  if(isR16Unlocked()) rounds.push('Round of 16','Quarter-finals','Semi-finals','3rd Place','Final');
  return rounds;
}
function isKORoundUnlocked(round){ return unlockedKORounds().includes(round); }
const API = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${DATA_FILE}`;

async function ghRead(){
  let r;
  try {
    r = await fetch(API + '?t=' + Date.now(), {
      headers: ghToken ? {Authorization:`token ${ghToken}`} : {}
    });
  } catch(e){
    throw new Error('Network error — check your internet connection.');
  }
  if(r.status === 404) throw new Error(`data.json not found in ${GH_OWNER}/${GH_REPO}. Make sure the file exists and the repo name is correct.`);
  if(r.status === 403) throw new Error('GitHub API rate limit hit. Wait a minute and retry.');
  if(!r.ok) throw new Error(`GitHub API returned status ${r.status}.`);
  const j = await r.json();
  ghFileSha = j.sha;
  try {
    return JSON.parse(atob(j.content.replace(/\n/g,'')));
  } catch(e) {
    throw new Error('data.json exists but could not be parsed. Make sure it contains valid JSON.');
  }
}

async function ghWrite(data){
  if(!ghToken) throw new Error('No token');
  // Use TextEncoder → Uint8Array → base64 to avoid double-encoding of UTF-8 characters
  const json = JSON.stringify(data, null, 2);
  const bytes = new TextEncoder().encode(json);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  const body = {
    message: `Update predictions ${new Date().toISOString()}`,
    content: btoa(binary),
    sha: ghFileSha
  };
  const r = await fetch(API, {
    method:'PUT',
    headers:{Authorization:`token ${ghToken}`,'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!r.ok){const e=await r.json();throw new Error(e.message||'Write failed');}
  const j = await r.json();
  ghFileSha = j.content.sha;
}

// ══ SCORING ═══════════════════════════════════════════════════════════════
function calcPoints(playerName){
  const p = GD.predictions[playerName] || {};
  let qual=0, thirds=0, ko=0, tw=0;
  for(const g of GROUP_KEYS){
    const actual=GD.qualActual[g]||[];
    for(const t of (p.qual?.[g]||[]))
      if(actual.some(a=>a&&t&&a.toLowerCase()===t.toLowerCase())) qual+=3;
  }
  const tA=GD.thirdsActual||[];
  const tP=p.thirds||{};
  const tPvals=Array.isArray(tP)?tP:Object.values(tP);
  for(const t of tPvals)
    if(tA.some(a=>a&&t&&a.toLowerCase()===t.toLowerCase())) thirds++;
  for(const m of KO_MATCHES){
    const pred=(p.ko||{})[m.id];
    const res=GD.koResults[m.id];
    if(res&&pred&&pred.toLowerCase()===res.toLowerCase()) ko+=3;
  }
  if(GD.twActual&&(p.tw||'').toLowerCase()===GD.twActual.toLowerCase()) tw=10;
  return {qual,thirds,ko,tw,total:qual+thirds+ko+tw};
}

// ══ INIT ══════════════════════════════════════════════════════════════════
async function init(){
  showLoading('Loading game data…');

  // Detect if config hasn't been filled in yet
  if(GH_OWNER === 'YOUR_GITHUB_USERNAME' || GH_REPO === 'YOUR_REPO_NAME'){
    showMain(`<div class="card" style="max-width:520px;margin:0 auto;">
      <div style="font-size:2rem;margin-bottom:.5rem;text-align:center">⚙️</div>
      <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--green);letter-spacing:1px;margin-bottom:.5rem;">Setup Required</h3>
      <p style="font-size:.85rem;color:var(--gray-mid);margin-bottom:1rem;line-height:1.6;">
        Open <code>index.html</code> in a text editor and fill in the three config values near the top of the <code>&lt;script&gt;</code> tag:
      </p>
      <div style="background:#f6f6f4;border-radius:8px;padding:.9rem 1rem;font-family:monospace;font-size:.8rem;color:#333;line-height:2;margin-bottom:1rem;">
        const GH_OWNER = '<strong>your-github-username</strong>';<br>
        const GH_REPO = '<strong>your-repo-name</strong>';<br>
        const ADMIN_PASSWORD = '<strong>choose-a-password</strong>';
      </div>
      <p style="font-size:.8rem;color:var(--gray-mid);">Then commit the file to your GitHub repo and reload this page.</p>
    </div>`);
    return;
  }

  // Restore token from session
  ghToken = sessionStorage.getItem('gh_token') || '';
  try {
    GD = await ghRead();
  } catch(e){
    showMain(`<div class="card" style="max-width:520px;margin:0 auto;text-align:center;">
      <div style="font-size:2rem;margin-bottom:.5rem">❌</div>
      <h3 style="font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--red);margin-bottom:.5rem;">Cannot load game data</h3>
      <p style="font-size:.83rem;color:var(--gray-mid);margin-bottom:.75rem;line-height:1.5;">${e.message}</p>
      <p style="font-size:.8rem;color:var(--gray-mid);line-height:1.5;">
        Check that:<br>
        • <code>GH_OWNER</code> and <code>GH_REPO</code> are correct<br>
        • <code>data.json</code> exists in the root of your repo<br>
        • GitHub Pages is enabled for the repo
      </p>
      <button class="btn btn-green" style="margin-top:1rem;" onclick="init()">🔄 Retry</button>
    </div>`);
    return;
  }
  const hash = location.hash;
  if(hash === '#admin'){
    showAdminLogin();
  } else if(hash === '#scores'){
    showScores();
  } else {
    showWelcome();
  }
}

// ══ LOADING ════════════════════════════════════════════════════════════════
function showLoading(msg='Loading…'){
  document.getElementById('main-content').innerHTML=
    `<div class="loading-screen"><div class="spinner"></div><p>${msg}</p></div>`;
}
function showMain(html){
  document.getElementById('main-content').innerHTML = html;
}

// ══ WELCOME PAGE ══════════════════════════════════════════════════════════
function showWelcome(){
  document.getElementById('admin-nav').style.display='none';
  document.getElementById('player-nav').style.display='none';
  document.getElementById('sticky-submit').style.display='none';
  document.getElementById('scores-section').style.display='none';
  document.getElementById('main-content').style.display='block';
  document.getElementById('header-sub').textContent='Prediction Game';
  document.getElementById('player-badge').style.display='none';
  location.hash='';
  isAdmin=false; currentPlayer=null;
  stopScoreRefresh();

  showMain(`<div class="welcome-wrap">
    <div class="header-badge" style="margin-bottom:.75rem;">USA · Canada · Mexico · 2026</div>
    <div class="welcome-title">⚽ World Cup <span>2026</span></div>

        <div class="w-icon">🎯</div>
        <div class="w-title">Predictions</div>
        <div class="w-desc">Enter your picks &amp; check the leaderboard</div>
      </button>
      <button class="welcome-btn scores" onclick="showScores()">
        <div class="w-icon">📺</div>
        <div class="w-title">Live Scores</div>
        <div class="w-desc">Follow all World Cup matches in real time</div>
      </button>
    </div>
    <div style="margin-top:1.5rem;">
      <button onclick="location.hash='admin';showAdminLogin()" style="background:none;border:none;color:rgba(255,255,255,.3);font-size:.72rem;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:underline;">Admin access</button>
    </div>
  </div>`);
}

// ══ HOME (player picker with password) ════════════════════════════════════
function showHome(){
  document.getElementById('admin-nav').style.display='none';
  document.getElementById('player-nav').style.display='none';
  document.getElementById('sticky-submit').style.display='none';
  document.getElementById('scores-section').style.display='none';
  document.getElementById('main-content').style.display='block';
  document.getElementById('header-sub').textContent='Prediction Game';
  document.getElementById('player-badge').style.display='none';
  isAdmin = false;
  stopScoreRefresh();

  const locked = isPredictionLocked();
  const playerBtns = GD.players.map(p=>{
    const name = typeof p === 'string' ? p : p.name;
    const hasSubmitted = !!GD.predictions[name];
    return `<button class="player-select-btn" onclick="showPlayerLogin('${name.replace(/'/g,"\\'")}')">
      <div class="avatar">${name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase()}</div>
      <span>${name}</span>
      <span class="status-tag ${hasSubmitted?'status-submitted':'status-pending'}">${hasSubmitted?'✅ Submitted':'Pending'}</span>
    </button>`;
  }).join('');

  const deadlineBanner = locked
    ? `<div style="background:#fff0f0;border:1px solid var(--red);border-radius:8px;padding:.7rem 1rem;margin-bottom:1rem;font-size:.8rem;color:var(--red);font-weight:600;">🔒 Predictions are locked — the deadline has passed.</div>`
    : `<div style="background:#fff8e7;border:1px solid var(--gold);border-radius:8px;padding:.7rem 1rem;margin-bottom:1rem;font-size:.78rem;color:#856404;">⏰ Predictions lock on <strong>June 17 at 10:00 PM ET</strong></div>`;

  showMain(`<div class="home-card">
    <button class="back-btn" style="margin-bottom:.9rem;" onclick="showWelcome()">← Back</button>
    <h2>⚽ Who are you?</h2>
    ${deadlineBanner}
    <p style="margin-bottom:.9rem;">Select your name then enter your password to access your predictions.</p>
    <div class="player-select-list">${playerBtns||'<p style="color:var(--gray-mid);font-size:.85rem">No players added yet.</p>'}</div>
    <div style="padding-top:.75rem;border-top:1px solid #eee;">
      <button onclick="showLeaderboard()" class="btn btn-green btn-full">🏆 View Leaderboard</button>
    </div>
    <div class="admin-link"><button onclick="location.hash='admin';showAdminLogin()">Admin access →</button></div>
  </div>`);
}

function showPlayerLogin(name){
  const hasPass = GD.playerPasswords && GD.playerPasswords[name];
  showMain(`<div class="home-card">
    <h2>👤 ${name}</h2>
    <p style="margin-bottom:1rem;">${hasPass ? 'Enter your password to access your predictions.' : 'Set a password to protect your predictions.'}</p>
    <input type="password" id="player-pw-input" placeholder="${hasPass?'Password':'Choose a password'}"
      style="width:100%;padding:10px 14px;border:1.5px solid #d0d0cc;border-radius:8px;font-family:'Inter',sans-serif;font-size:1rem;margin-bottom:.75rem;"
      onkeydown="if(event.key==='Enter')submitPlayerLogin('${name.replace(/'/g,"\\'")}')">
    <button class="btn btn-green btn-full" onclick="submitPlayerLogin('${name.replace(/'/g,"\\'")}')">
      ${hasPass ? '🔓 Login' : '✅ Set Password & Continue'}
    </button>
    <div id="player-login-error" style="margin-top:.5rem;font-size:.8rem;color:var(--red);font-weight:600;"></div>
    <div style="margin-top:.75rem;">
      <button class="btn btn-gray btn-full" onclick="showHome()">← Back</button>
    </div>
  </div>`);
  setTimeout(()=>document.getElementById('player-pw-input')?.focus(),100);
}

async function submitPlayerLogin(name){
  const pw = document.getElementById('player-pw-input').value;
  const errEl = document.getElementById('player-login-error');
  if(!pw){ errEl.textContent='Please enter a password.'; return; }

  if(!GD.playerPasswords) GD.playerPasswords = {};
  const stored = GD.playerPasswords[name];

  if(!stored){
    // First time — set the password
    if(pw.length < 3){ errEl.textContent='Password must be at least 3 characters.'; return; }
    // Need token to save the password
    if(!ghToken){
      const tok = prompt('Enter the game token to save your password:');
      if(!tok){ errEl.textContent='Token required to save password.'; return; }
      ghToken = tok.trim();
      sessionStorage.setItem('gh_token', ghToken);
    }
    try {
      GD = await ghRead();
      if(!GD.playerPasswords) GD.playerPasswords = {};
      GD.playerPasswords[name] = pw;
      await ghWrite(GD);
      loginAsPlayer(name);
    } catch(e){
      errEl.textContent = '❌ Could not save password: ' + e.message;
      ghToken=''; sessionStorage.removeItem('gh_token');
    }
  } else {
    // Check password
    if(pw !== stored){ errEl.textContent='❌ Incorrect password.'; return; }
    loginAsPlayer(name);
  }
}

function loginAsPlayer(name){
  currentPlayer = name;
  isAdmin = false;
  if(GD.predictions[name]){
    const saved = GD.predictions[name];
    PP.qual   = saved.qual   || {};
    PP.thirds = saved.thirds || {};
    PP.ko     = saved.ko     || {};
    PP.tw     = saved.tw     || '';

  </div>${lockBanner}`;
  html += GROUP_KEYS.map(g=>{
    const teams=GROUPS[g];
    const picks=PP.qual[g]||['',''];
    const selects=[0,1].map(idx=>{
      const sel=picks[idx]||'';

      <div class="player-section-hdr green"><h3>${status} Group ${g}</h3><span class="badge">${teams.join(' · ')}</span></div>

function setPlayerQual(g,idx,val){
  if(!PP.qual[g])PP.qual[g]=['',''];
  if(val&&PP.qual[g][1-idx]===val)PP.qual[g][1-idx]='';
  PP.qual[g][idx]=val;
  if(Array.isArray(PP.thirds))PP.thirds={};
  if(val&&PP.thirds[g]===val)PP.thirds[g]='';
  renderPlayerQualifiers();
  if(document.getElementById('tab-pt').classList.contains('active'))renderPlayerThirds();
}
function updateQualProgress(){
  let f=0;
  for(const g of GROUP_KEYS){const p=PP.qual[g]||[];f+=p.filter(v=>v).length;}
  const pct=Math.round(f/24*100);
  const bar=document.getElementById('pq-bar');
  const lbl=document.getElementById('pq-label');
  if(bar)bar.style.width=pct+'%';
  if(lbl)lbl.textContent=`${f} / 24 picks made`;
}

    if(locked){
      btns=teams.map(t=>{

      }).join('');

      btns=teams.map(t=>{

        const cls=isQual?'thirds-team-btn qualifier':isSel?'thirds-team-btn selected':capLocked?'thirds-team-btn cap-locked':'thirds-team-btn';
        const dis=isQual||capLocked?'disabled':'';

function renderSubmit(){
  const cont=document.getElementById('tab-psubmit');
  // If predictions are locked, show read-only summary
  if(isPredictionLocked()){
    cont.innerHTML=`<div class="submit-card">
      <h3>🔒 Predictions Locked</h3>

      ${GD.predictions[currentPlayer]?'<div style="margin-top:.75rem;padding:.75rem 1rem;background:#d4edda;border-radius:8px;font-size:.85rem;color:#1a6b3c;font-weight:600;">✅ Your predictions were submitted before the deadline.</div>':'<div style="margin-top:.75rem;padding:.75rem 1rem;background:#fff0f0;border-radius:8px;font-size:.85rem;color:var(--red);font-weight:600;">⚠️ No predictions were saved before the deadline.</div>'}
    </div>`;
    return;
  }
  const errors=validatePredictions();
  const errHtml=errors.length?`<div class="val-error">⚠ Please fix these before submitting:<ul>${errors.map(e=>`<li>${e}</li>`).join('')}</ul></div>`:'';
  const tokenSection=!ghToken?`
    <div style="margin-bottom:.9rem;padding:.85rem 1rem;background:#fff8e7;border:1px solid var(--gold);border-radius:10px;">
      <div style="font-size:.75rem;font-weight:700;color:#856404;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem;">🎫 Game Token</div>
      <p style="font-size:.78rem;color:#856404;margin-bottom:.5rem;">Enter the token shared by the admin to save your predictions.</p>
      <input id="game-token-input" type="text" placeholder="Paste game token here…" style="width:100%;padding:8px 10px;border:1.5px solid var(--gold);border-radius:7px;font-family:monospace;font-size:.8rem;color:var(--gray-dark);">
    </div>`:'';
  cont.innerHTML=`<div class="submit-card">
    <h3>📤 Submit Your Predictions</h3>
    <p>Click below to save your predictions. You can update them anytime before <strong>June 17 at 10:00 PM ET</strong>.</p>
    <div id="submit-errors">${errHtml}</div>
    ${tokenSection}
    <button class="btn btn-gold btn-full" style="font-size:.95rem;padding:.8rem;" onclick="submitPredictions()" ${errors.length?'disabled style="opacity:.5;cursor:not-allowed;font-size:.95rem;padding:.8rem;"':''}>
      ✅ Submit My Predictions
    </button>
    <div id="submit-status" style="margin-top:.75rem;font-size:.82rem;font-weight:600;text-align:center;"></div>
  </div>`;
}

function validatePredictions(){
  const errors=[];
  const missingQual=[], dupQual=[];
  for(const g of GROUP_KEYS){
    const p=PP.qual[g]||['',''];
    if(!p[0]||!p[1]) missingQual.push(`Group ${g}`);
    else if(p[0]===p[1]) dupQual.push(`Group ${g}`);
  }
  if(missingQual.length) errors.push(`Missing qualifier picks: ${missingQual.join(', ')}`);
  if(dupQual.length) errors.push(`Duplicate qualifier picks: ${dupQual.join(', ')}`);
  if(Array.isArray(PP.thirds))PP.thirds={};
  const tc=GROUP_KEYS.filter(g=>PP.thirds[g]).length;
  if(tc<8) errors.push(`Best 3rd places: ${8-tc} more pick(s) needed (${tc}/8)`);
  if(GD.unlocked){
    const missingKO=KO_MATCHES.filter(m=>!PP.ko[m.id]);
    if(missingKO.length) errors.push(`Knockout picks: ${missingKO.length} match(es) missing`);
    if(!PP.tw) errors.push('No tournament winner picked');
  }
  return errors;
}

async function submitPredictions(){
  const status=document.getElementById('submit-status');
  const btn=document.querySelector('#tab-psubmit .btn-gold');
  btn.disabled=true; btn.textContent='Saving…';
  status.style.color='var(--gray-mid)'; status.textContent='Connecting to GitHub…';
  // Ask for token if not stored
  if(!ghToken){
    const tok=document.getElementById('game-token-input')?.value.trim();
    if(!tok){
      status.style.color='var(--red)';
      status.textContent='⚠ Please enter the game token first.';
      btn.disabled=false; btn.textContent='✅ Submit My Predictions';
      return;
    }
    ghToken=tok;
    sessionStorage.setItem('gh_token', ghToken);
  }
  try {
    GD = await ghRead();
    GD.predictions[currentPlayer] = { qual:PP.qual, thirds:PP.thirds, ko:PP.ko, tw:PP.tw };
    await ghWrite(GD);
    document.getElementById('tab-psubmit').innerHTML=`<div class="submit-success">
      <div class="check">✅</div>
      <h3>Predictions Saved!</h3>
      <p>Your picks are live. You can come back anytime to update them before the deadline.</p>
      <button class="btn btn-green" style="margin-top:1rem;" onclick="showHome()">← Back to home</button>
    </div>`;
    document.getElementById('sticky-submit').style.display='none';
  } catch(e){
    status.style.color='var(--red)';
    status.textContent='❌ '+e.message;
    btn.disabled=false; btn.textContent='✅ Submit My Predictions';
    ghToken=''; sessionStorage.removeItem('gh_token');
  }
}

async function adminSavePlayers(){
  const names=[];
  for(let i=0;i<11;i++){const v=document.getElementById('adp'+i).value.trim();if(v)names.push(v);}
  GD.players=names.length?names:['Player 1'];
  await adminSave('asetup-status');
}
async function adminToggleUnlock(val){
  GD.unlocked=val;
  await adminSave();
}
async function adminSave(statusId){
  const status=statusId?document.getElementById(statusId):null;
  if(status){status.style.color='var(--gray-mid)';status.textContent='Saving…';}
  try{
    await ghWrite(GD);
    if(status){status.style.color='var(--green)';status.textContent='✅ Saved!';}
    setTimeout(()=>{if(status)status.textContent='';},3000);
  }catch(e){
    if(status){status.style.color='var(--red)';status.textContent='❌ '+e.message;}
  }
}

// ══ LIVE SCORES ══════════════════════════════════════════════════════════
// openfootball/worldcup.json — free, no API key, no auth
// Schema: { rounds: [{ name, matches: [{ date, time, team1:{name,code}, team2:{name,code}, score1, score2, score1i, score2i, goals1, goals2, group, stadium:{name}, city, timezone }] }] }
const SCORES_API='https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
let scoresData=[],scoreFilter='all',scoreRefreshTimer=null;
const FLAGS={'Mexico':'🇲🇽','South Korea':'🇰🇷','South Africa':'🇿🇦','Czechia':'🇨🇿','Czech Republic':'🇨🇿','Canada':'🇨🇦','Bosnia-Herzegovina':'🇧🇦','Bosnia and Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭','Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿','USA':'🇺🇸','United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Türkiye':'🇹🇷','Turkey':'🇹🇷','Germany':'🇩🇪','Curaçao':'🏝️','Curacao':'🏝️','Ivory Coast':'🇨🇮',"Côte d'Ivoire":'🇨🇮','Ecuador':'🇪🇨','Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳','Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿','Spain':'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾','France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴','Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴','Portugal':'🇵🇹','Congo DR':'🇨🇩','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴','England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦'};
function flag(n){return FLAGS[n]||'🏳️';}

function showScores(){
  document.getElementById('admin-nav').style.display='none';
  document.getElementById('player-nav').style.display='none';
  document.getElementById('sticky-submit').style.display='none';
  document.getElementById('main-content').style.display='none';

  document.getElementById('header-sub').textContent='Live Scores';

  location.hash='scores';
  fetchScores();
  stopScoreRefresh();

}
function stopScoreRefresh(){
  if(scoreRefreshTimer){clearInterval(scoreRefreshTimer);scoreRefreshTimer=null;}
  const lbl=document.getElementById('refresh-label');
  if(lbl)lbl.textContent='';
}
async function fetchScores(){
  const grid=document.getElementById('scores-grid');
  const lbl=document.getElementById('refresh-label');
  if(!grid)return;
  if(lbl)lbl.textContent='Refreshing…';
  try{
    // Cache-bust so we always get fresh data
    const r=await fetch(SCORES_API+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const json=await r.json();
    // openfootball schema: { rounds: [{ name, matches:[...] }] }
    // Flatten all matches from all rounds, attach round name
    const rounds=json.rounds||[];
    scoresData=[];
    for(const round of rounds){
      for(const m of (round.matches||[])){
        scoresData.push({...m, _round: round.name});
      }
    }
    renderScores();
    const t=new Date();
    if(lbl)lbl.textContent='Updated '+t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    if(grid)grid.innerHTML=`<div class="no-matches"><div class="nm-icon">📡</div><p style="color:rgba(255,255,255,.5);font-size:.85rem;">Could not load scores.<br>${e.message}</p><button class="refresh-btn" style="margin:.75rem auto 0;" onclick="fetchScores()">Try again</button></div>`;
    if(lbl)lbl.textContent='Failed';
  }
}
function setScoreFilter(f,btn){
  scoreFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderScores();
}

// Determine match status from openfootball schema
// score1/score2 present = finished; no score = upcoming
// openfootball doesn't have live data, so we infer from date/time
function getStatus(m){
  const hasScore = m.score1 != null && m.score2 != null;
  if(hasScore) return 'ft';
  // Check if match time has passed (match is likely in progress or upcoming)
  if(m.date && m.time){
    // Parse date + time. openfootball times are local to stadium, approximate as UTC
    // We just use date comparison — if today's date matches, show as "today"
    const matchDate = new Date(m.date+'T'+m.time+':00Z');
    const now = new Date();
    const diffMins = (now - matchDate) / 60000;
    if(diffMins > 0 && diffMins < 120) return 'live'; // within 2h window = possibly live
  }
  return 'upcoming';
}

function renderScores(){
  const grid=document.getElementById('scores-grid');
  if(!grid)return;
  const liveDot=document.getElementById('live-dot');
  const today=new Date().toISOString().slice(0,10);

  let matches=[...scoresData];
  if(scoreFilter==='live') matches=matches.filter(m=>getStatus(m)==='live');
  else if(scoreFilter==='ft') matches=matches.filter(m=>getStatus(m)==='ft');
  else if(scoreFilter==='upcoming') matches=matches.filter(m=>getStatus(m)==='upcoming');
  else if(scoreFilter==='today') matches=matches.filter(m=>(m.date||'').slice(0,10)===today);

  // Sort: live first, ft by date desc (most recent first), upcoming by date asc
  matches.sort((a,b)=>{
    const order={live:0,ft:1,upcoming:2};
    const sa=order[getStatus(a)]??2, sb=order[getStatus(b)]??2;
    if(sa!==sb) return sa-sb;
    const da=new Date(a.date||0), db=new Date(b.date||0);
    // ft: newest first; upcoming: oldest first
    return sa===1 ? db-da : da-db;
  });

  const hasLive=scoresData.some(m=>getStatus(m)==='live');
  if(liveDot) liveDot.style.display=hasLive?'block':'none';

  if(!matches.length){
    grid.innerHTML=`<div class="no-matches"><div class="nm-icon">🕐</div><p style="color:rgba(255,255,255,.5)">No matches for this filter</p></div>`;
    return;
  }

  grid.innerHTML=matches.map(m=>{
    const status=getStatus(m);
    // openfootball field names
    const home=m.team1?.name||'?';
    const away=m.team2?.name||'?';
    const hs=m.score1;  // null if not played
    const as_=m.score2;
    const hshi=m.score1i; // half-time scores
    const ashi=m.score2i;
    const group=m.group||m._round||'';
    const venue=m.stadium?.name||m.city||'';
    const city=m.city||'';
    const venueStr=[m.stadium?.name, city].filter(Boolean).join(', ');

    // Date + time display
    let kickoffStr='';
    if(m.date){
      const d=new Date(m.date+'T'+(m.time||'00:00')+':00');
      kickoffStr=d.toLocaleString([],{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    }

    // Goal scorers
    const g1=m.goals1||[];
    const g2=m.goals2||[];
    const scorers=(g1.length||g2.length)
      ?`<div class="scorers-list">${[
          ...g1.map(g=>`${flag(home)} <strong>${g.name}</strong> ${g.minute}'${g.offset?'+'+g.offset:''}`),
          ...g2.map(g=>`${flag(away)} <strong>${g.name}</strong> ${g.minute}'${g.offset?'+'+g.offset:''}`)
        ].join(' &nbsp;·&nbsp; ')}</div>`:'' ;

    const badge = status==='live'
      ? `<span class="score-status-badge badge-live">🔴 LIVE</span>`
      : status==='ft'
      ? `<span class="score-status-badge badge-ft">✅ FT${hshi!=null?` <span style="opacity:.6;font-size:.6rem;">(HT ${hshi}–${ashi})</span>`:''}</span>`
      : `<span class="score-status-badge badge-upcoming">${kickoffStr}</span>`;

    const scoreHtml = (status==='ft'||status==='live')
      ? `<div class="score-nums">
          <div class="score-num${status==='live'?' live-num':''}">${hs}</div>
          <div class="score-sep">–</div>
          <div class="score-num${status==='live'?' live-num':''}">${as_}</div>
        </div>`
      : `<div class="score-vs">${kickoffStr||'vs'}</div>`;

    return `<div class="score-card status-${status}">
      <div class="score-card-header"><span class="score-round">${group}</span>${badge}</div>
      <div class="score-teams">
        <div class="score-team"><div class="score-flag">${flag(home)}</div><div class="score-team-name">${home}</div></div>
        ${scoreHtml}
        <div class="score-team"><div class="score-flag">${flag(away)}</div><div class="score-team-name">${away}</div></div>
      </div>
      ${scorers}
      <div class="score-card-footer"><span class="score-venue">${venueStr}</span></div>
    </div>`;
  }).join('');
}

// ══ UTILS ═════════════════════════════════════════════════
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    const orig=btn.textContent;btn.textContent='✓';
    setTimeout(()=>btn.textContent=orig,1800);
  });
}

init();
</script>
